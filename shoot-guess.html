<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>射履 - 还以为是射箭的游戏</title>
  <link rel="stylesheet" href="css/shoot-guess.css">
  <link rel="stylesheet" href="css/gomoku.css">
  <link rel="stylesheet" href="css/modal.css">
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="shoot-container">
    <header class="gomoku-header">
      <button id="shootBackBtn" class="gomoku-back">←</button>
      <span class="gomoku-title">射履</span>
    </header>

    <div id="shootLobby" class="shoot-lobby">
      <div class="gomoku-room-list">
        <div class="gomoku-room-list-header">
          <span>房间列表</span>
          <div style="display:flex;gap:10px;">
            <button id="shootCreateBtn" class="gomoku-join-btn" style="padding:8px 16px;">＋ 创建房间</button>
            <button id="shootRefreshBtn" class="gomoku-join-btn" style="padding:8px 16px;background:linear-gradient(90deg,#7aa2f7,#4f8cff);">刷新</button>
          </div>
        </div>
        <div id="shootRoomsList"></div>
      </div>
    </div>

    <div id="shootGame" class="shoot-game" style="display:none;">
      <div class="shoot-info">
        <div class="shoot-player" id="shootP1"><span class="name">P1</span><span class="score">0</span></div>
        <div class="vs">VS</div>
        <div class="shoot-player" id="shootP2"><span class="name">P2</span><span class="score">0</span></div>
      </div>
      <div class="shoot-round">
        <div>回合 <span id="shootRound">1</span>/5 · 类别 <span id="shootCategory">—</span> · 剩余机会 <span id="shootChances">15</span> · 倒计时 <span id="shootTimer">60</span>s</div>
      </div>
      <div class="shoot-panels">
        <div class="shoot-left">
          <div class="shoot-panel-title">对话</div>
          <div id="shootMessages" class="shoot-messages"></div>
          <div id="askArea" class="shoot-input">
            <input id="shootQuestionInput" type="text" placeholder="履者提问或直接输入答案进行猜测..." maxlength="60">
            <button id="shootSendQuestionBtn" class="shoot-btn primary">发送</button>
          </div>
        </div>
        <div class="shoot-right">
          <div id="setterArea" class="shoot-panel">
            <div class="shoot-panel-title">射者设置</div>
            <div class="shoot-form" style="flex-wrap:wrap;gap:6px 8px;">
              <input id="shootCategoryInput" type="text" placeholder="输入类别（自定义，如 植物/物品/人/...）" maxlength="10" style="flex:1;min-width:180px;">
              <input id="shootWordInput" type="text" placeholder="输入谜底（仅射者可见）" maxlength="12" style="flex:1;min-width:180px;">
              <button id="shootStartRoundBtn" class="shoot-btn primary">开始！</button>
            </div>
          </div>
          <div id="judgeArea" class="shoot-panel" style="display:none;">
            <div class="shoot-panel-title">回答</div>
            <div class="shoot-judge">
              <button class="shoot-btn" data-judge="是">是</button>
              <button class="shoot-btn" data-judge="否">否</button>
              <button class="shoot-btn" data-judge="接近了">接近了</button>
              <button class="shoot-btn" data-judge="差远了">差远了</button>
              <button class="shoot-btn danger" data-judge="答案正确">答案正确</button>
            </div>
          </div>
        </div>
      </div>
      <div class="shoot-controls">
        <button id="shootEndBtn" class="shoot-btn danger" style="display:none;">结束比赛</button>
      </div>
    </div>
  </div>

  <script src="js/pages/shoot-guess.js"></script>
  <script type="text/javascript">
    document.addEventListener('plusready', function(){
      plus.key.addEventListener('backbutton', function(){
        history.back();
      }, false);
    });
  </script>
</body>
</html>
