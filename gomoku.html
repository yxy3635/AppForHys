<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线五子棋</title>
    <link rel="stylesheet" href="css/gomoku.css">
    <link rel="stylesheet" href="css/modal.css">
    <script src="js/config.js"></script>
    <script src="js/notification-native.js"></script>
    <script src="js/global-notification.js"></script>
</head>
<body>
    <div class="gomoku-header">
        <button class="gomoku-back" id="gomokuBackBtn" title="返回">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M14 18L8 11L14 4" stroke="#4f8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="gomoku-title">在线五子棋</span>
    </div>
    <div class="gomoku-main">
        <div id="gomokuRoomList" class="gomoku-room-list">
            <div class="gomoku-room-list-header">
                <span>房间列表</span>
                <button id="createRoomBtn" class="gomoku-join-btn">+ 创建房间</button>
            </div>
            <div id="roomListContainer" class="room-list-container">
                <div class="gomoku-empty loading">加载中...</div>
            </div>
        </div>
        <div id="gomokuGameArea" class="gomoku-game-area" style="display:none;">
            <div class="gomoku-game-header">
                <button class="gomoku-exit-btn" id="gomokuExitBtn">← 返回房间列表</button>
                <div class="gomoku-players">
                    <span id="playerBlack" class="gomoku-player black">○ 玩家1</span>
                    <span class="vs">VS</span>
                    <span id="playerWhite" class="gomoku-player white">● 玩家2</span>
                </div>
                <div id="gomokuTurnInfo" class="gomoku-turn-info">当前回合：-</div>
            </div>
            <div class="gomoku-board-wrapper">
                <div id="gomokuBoard" class="gomoku-board"></div>
            </div>
            <div id="gomokuGameMsg" class="gomoku-game-msg"></div>
        </div>
    </div>
    <div id="gomokuModal" class="gomoku-modal" style="display:none;"></div>
    <script src="js/theme.js"></script>
    <script src="js/pages/gomoku.js"></script>
    <script type="text/javascript">
      document.addEventListener('plusready', function(){
        plus.key.addEventListener('backbutton', function(){
          history.back();
        }, false);
      });
    </script>
</body>
</html>
