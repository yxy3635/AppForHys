<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>我们的手记</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/diary.css">
  <link rel="stylesheet" href="css/modal.css">
  <script src="js/config.js"></script>
  <script src="js/notification-native.js"></script>
  <script src="js/global-notification.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/snow.js"></script>
  <script src="js/snow-init.js"></script>
</head>
<body>
  <header class="home-header diary-header">
    <button id="back-btn" onclick="history.back()"></button>
    <div class="diary-header-content">
      <span class="header-main">我们的手记</span>
      <span class="diary-subtitle">记录美好时光</span>
    </div>
    <!-- <button id="search-btn" onclick="toggleSearch()">🔍</button> -->
  </header>

  <!-- 搜索栏（已移除） -->
  <!-- <div id="search-bar" class="search-bar" style="display:none;">
    <input type="text" id="search-input" placeholder="搜索手记内容..." oninput="window.searchDiaries && window.searchDiaries(this.value.toLowerCase())">
    <button onclick="clearSearch()">✕</button>
  </div> -->

  <main class="diary-main">
    <!-- 统计信息 -->
    <div class="diary-stats">
      <div class="stat-item">
        <span class="stat-number" id="total-diaries">0</span>
        <span class="stat-label">总手记</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="this-month">0</span>
        <span class="stat-label">本月</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="this-week">0</span>
        <span class="stat-label">本周</span>
      </div>
    </div>

    <!-- 新建手记按钮 -->
    <div class="new-diary-btn" onclick="goNewDiary()">
      <span class="new-diary-icon">✏️</span>
      <span class="new-diary-text">写手记</span>
    </div>

    <!-- 手记列表 -->
    <div class="diary-list" id="diary-list">
      <!-- 手记内容将通过JavaScript动态加载 -->
    </div>

    <!-- 空状态 -->
    <div class="diary-empty" id="diary-empty" style="display:none;">
      <div class="empty-icon">📝</div>
      <div class="empty-title">还没有手记</div>
      <div class="empty-desc">记录下你们的美好时光吧~</div>
      <button class="empty-btn" onclick="goNewDiary()">写第一篇手记</button>
    </div>
  </main>

  <script src="js/modal.js"></script>
  <script src="js/pages/diary.js"></script>
  <script>
    document.addEventListener('plusready', function(){
      plus.key.addEventListener('backbutton', function(){
        history.back();
      }, false);
    });

    function goNewDiary() {
      window.location.href = 'diary-new.html';
    }

    // 移除toggleSearch和clearSearch等搜索相关函数
  </script>
</body>
</html>
