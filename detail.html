<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>动态详情</title>
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/modal.css">
  <script src="js/config.js"></script>
  <script src="js/notification-native.js"></script>
  <script src="js/global-notification.js"></script>
  <script src="js/snow.js"></script>
  <script src="js/snow-init.js"></script>
</head>
<body>
  <header class="home-header">
    <button id="back-btn" onclick="goHome()">返回</button>
    <span>动态详情</span>
  </header>
  <main id="detail-main" class="page-flip-in">
    <!-- 动态详情内容 -->
    <div class="comment-section">
      <h2>宝宝说</h2>
      <div class="comment-input">
        <textarea id="comment-text" placeholder="领导大人请发话~"></textarea>
        <button id="submit-comment-btn">biu~</button>
      </div>
      <div id="comments-list">
        <!-- 评论将在这里加载 -->
      </div>
    </div>
  </main>
  <script src="js/modal.js"></script>
  <script src="js/pages/detail.js"></script>
  <script src="js/theme.js"></script>
  <script type="text/javascript">
    document.addEventListener('plusready', function(){
      plus.key.addEventListener('backbutton', function(){
        history.back();
      }, false);
    });
  </script>
  <!-- 图片预览模态框 -->
  <div id="image-preview-modal" class="image-preview-modal">
    <span class="close-button">&times;</span>
    <img class="modal-content-image" id="modal-preview-image">
  </div>
  <script>
    function goHome() { window.location.href = 'home.html'; }
    function goInteraction() { window.location.href = 'interaction.html'; }
    function goAnniversary() { window.location.href = 'anniversary.html'; }
    function goProfile() { window.location.href = 'profile.html'; }
  </script>
</body>
</html>
