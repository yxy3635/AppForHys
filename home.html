<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>YandH 小窝</title>
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/modal.css">
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/notification-native.js"></script>
  <script src="js/global-notification.js"></script>
  <script src="js/snow.js"></script>
  <script type="text/javascript">
    let firstBack = null;

    document.addEventListener('plusready', function(){
      plus.key.addEventListener('backbutton', function(){
        if(!firstBack){
          firstBack = new Date().getTime();
          plus.nativeUI.toast('再滑动一次退出应用');
          setTimeout(function(){
            firstBack = null;
          }, 2000); // 2秒内有效
        } else if(new Date().getTime() - firstBack < 2000){
          plus.runtime.quit();
        }
      }, false);
    });
  </script>
</head>
<body>
  <header class="home-header">
    <div class="header-title">
      <span class="header-emoji">🌟</span>
      <span class="header-main">YandH 小窝</span>
    </div>
    <button id="refresh-btn" onclick="refreshFeed()">刷新动态</button>
    <button id="post-btn" onclick="goPost()">发布动态</button>
  </header>
  <main id="feed-list">
    <!-- 动态流内容，后续用js填充 -->
  </main>
  <nav id="bottom-nav">
    <button class="active" onclick="goHome()">主页</button>
    <button onclick="goInteraction()">互动</button>
    <button onclick="goAnniversary()">纪念日</button>
    <button onclick="goProfile()">我的</button>
    <button id="admin-btn" onclick="goAdmin()" style="display: none;">管理</button>
  </nav>
  <script src="js/modal.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/nav-unread.js"></script>
  <script src="js/nav-indicator.js"></script>
  <script>
    // 初始化雪花效果
    document.addEventListener('DOMContentLoaded', () => {
      // 检查用户设置，默认为开启
      const snowEnabled = localStorage.getItem('snow_effect_enabled') !== 'false';
      
      if (snowEnabled) {
        // 仅在非深色模式或者根据喜好开启，这里默认开启
        // 可以判断是否是冬天或者特定节日来改变 colors
        const isDark = document.body.classList.contains('dark-theme');
        const snow = new SnowEffect({
          count: 40, // 粒子数量
          speed: 0.8, // 速度
          colors: isDark ? ['#ffffff44', '#aaddff44'] : ['#aaddff', '#e6f0ff', '#ffffff']
        });
      }
    });

    function goInteraction() { window.location.href = 'interaction.html'; }
    function goAdmin() { window.location.href = 'admin.html'; }
    document.addEventListener('DOMContentLoaded', function() {
      // 检查登录状态
      var currentUserId = localStorage.getItem('user_id');
      var loginTimestamp = localStorage.getItem('login_timestamp');
      
      // 如果没有登录，跳转到登录页面
      if (!currentUserId || !loginTimestamp) {
        window.location.href = 'index.html';
        return;
      }
      
      // 检查登录是否过期（72小时）
      var now = Date.now();
      var ONE_DAY_IN_MS = 72 * 60 * 60 * 1000; // 72 小时清除
      
      if (now - parseInt(loginTimestamp) >= ONE_DAY_IN_MS) {
        // 登录已过期，清除登录信息并跳转
        localStorage.removeItem('user_id');
        localStorage.removeItem('username');
        localStorage.removeItem('login_timestamp');
        window.location.href = 'index.html';
        return;
      }
      
      // 已登录，继续执行原有逻辑
      var currentUsername = localStorage.getItem('username');
      updateInteractionExclaimOnce(currentUserId);
      
      // 检查是否为管理员，显示管理员按钮
      if (currentUsername === 'admin') {
        document.getElementById('admin-btn').style.display = 'block';
      }
    });
  </script>
</body>
</html>
